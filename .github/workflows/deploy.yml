name: "Deploy"
on:
  push:
    branches:
      - "master"
  workflow_dispatch:
env:
  cache-version: 1
jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v7

      - name: "Setup Node"
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      - name: "Cache NPM dependencies"
        uses: actions/cache@v6
        with:
          path: "~/.npm"
          key: npm-dependencies-${{ runner.os }}-${{ env.cache-version }}-${{ hashFiles('package.json') }}
          restore-keys: |
            npm-dependencies-${{ runner.os }}-${{ env.cache-version }}-${{ hashFiles('package.json') }}
            npm-dependencies-${{ runner.os }}-${{ env.cache-version }}-

      - name: "Install NPM dependencies"
        run: |
          npm ci

      - name: "Build"
        env:
          NODE_ENV: 'production'
        run: |
          npm run build

      - name: "Upload artifact"
        uses: actions/upload-artifact@v7
        with:
          name: "build-artifact"
          path: dist
          include-hidden-files: true

  deploy:
    name: "Deploy the website"
    runs-on: ubuntu-latest
    needs: build
    concurrency:
      group: "deploy"
      cancel-in-progress: true
    steps:
      - name: "Download artifact"
        uses: actions/download-artifact@v8
        with:
          name: "build-artifact"
          path: dist

      - name: "Deploy over FTP"
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/
          log-level: verbose
          exclude: |
            .well-known/pki-validation/*
            cgi-bin/*

  ping-google:
    name: "Ping Google to re-index the sitemap"
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: "Ping Google"
        run: |
          curl http://www.google.com/ping?sitemap=https://dedic.eu/sitemap.xml
